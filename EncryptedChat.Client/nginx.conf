server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # mime.types (included by the main nginx.conf) already maps .wasm → application/wasm.
    gzip on;
    gzip_types text/css application/javascript application/json application/wasm application/octet-stream;

    # REST API → backend
    location /api/ {
        proxy_pass http://encryptedchat-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub → backend (WebSocket upgrade)
    location /hubs/ {
        proxy_pass http://encryptedchat-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    # SPA fallback (Blazor client-side routes)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
