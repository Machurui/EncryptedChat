<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EncryptedChat.Client</title>
    <base href="/" />

    <link rel="stylesheet" href="css/output.css" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div class="initial-splash">
            <div class="initial-splash-layout">
                <div class="initial-splash-panel splash-sidebar">
                    <div class="splash-row">
                        <div class="skeleton" style="width:32px;height:32px;border-radius:8px;"></div>
                        <div style="flex:1;">
                            <div class="skeleton" style="width:110px;height:13px;border-radius:6px;"></div>
                            <div class="skeleton" style="width:65px;height:9px;border-radius:4px;margin-top:6px;"></div>
                        </div>
                    </div>
                    <div class="skeleton" style="width:100%;height:30px;border-radius:8px;margin-top:14px;"></div>
                    <div class="skeleton" style="width:100%;height:34px;border-radius:10px;margin-top:12px;"></div>
                    <div class="splash-rows">
                        <div class="splash-stack-row"><div class="skeleton" style="width:32px;height:32px;border-radius:10px;"></div><div style="flex:1;"><div class="skeleton" style="width:70%;height:12px;border-radius:6px;"></div><div class="skeleton" style="width:40%;height:10px;border-radius:4px;margin-top:5px;"></div></div></div>
                        <div class="splash-stack-row"><div class="skeleton" style="width:32px;height:32px;border-radius:10px;"></div><div style="flex:1;"><div class="skeleton" style="width:60%;height:12px;border-radius:6px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:4px;margin-top:5px;"></div></div></div>
                        <div class="splash-stack-row"><div class="skeleton" style="width:32px;height:32px;border-radius:10px;"></div><div style="flex:1;"><div class="skeleton" style="width:75%;height:12px;border-radius:6px;"></div><div class="skeleton" style="width:45%;height:10px;border-radius:4px;margin-top:5px;"></div></div></div>
                        <div class="splash-stack-row"><div class="skeleton" style="width:32px;height:32px;border-radius:10px;"></div><div style="flex:1;"><div class="skeleton" style="width:65%;height:12px;border-radius:6px;"></div><div class="skeleton" style="width:38%;height:10px;border-radius:4px;margin-top:5px;"></div></div></div>
                    </div>
                </div>
                <div class="initial-splash-column">
                    <div class="initial-splash-panel splash-header">
                        <div class="skeleton" style="width:40px;height:40px;border-radius:12px;"></div>
                        <div style="flex:1;">
                            <div class="skeleton" style="width:140px;height:14px;border-radius:6px;"></div>
                            <div class="skeleton" style="width:90px;height:10px;border-radius:4px;margin-top:6px;"></div>
                        </div>
                        <div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div>
                        <div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div>
                    </div>
                    <div class="initial-splash-panel splash-messages">
                        <div class="splash-msg"><div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div><div class="skeleton" style="width:240px;height:36px;border-radius:14px;"></div></div>
                        <div class="splash-msg own"><div class="skeleton" style="width:180px;height:36px;border-radius:14px;"></div></div>
                        <div class="splash-msg"><div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div><div class="skeleton" style="width:280px;height:36px;border-radius:14px;"></div></div>
                        <div class="splash-msg"><div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div><div class="skeleton" style="width:160px;height:36px;border-radius:14px;"></div></div>
                        <div class="splash-msg own"><div class="skeleton" style="width:220px;height:36px;border-radius:14px;"></div></div>
                    </div>
                </div>
                <div class="initial-splash-panel splash-members">
                    <div class="skeleton" style="width:80px;height:13px;border-radius:6px;"></div>
                    <div class="splash-rows">
                        <div class="splash-stack-row"><div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div><div style="flex:1;"><div class="skeleton" style="width:75%;height:11px;border-radius:6px;"></div><div class="skeleton" style="width:45%;height:9px;border-radius:4px;margin-top:4px;"></div></div></div>
                        <div class="splash-stack-row"><div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div><div style="flex:1;"><div class="skeleton" style="width:65%;height:11px;border-radius:6px;"></div><div class="skeleton" style="width:40%;height:9px;border-radius:4px;margin-top:4px;"></div></div></div>
                        <div class="splash-stack-row"><div class="skeleton" style="width:30px;height:30px;border-radius:50%;"></div><div style="flex:1;"><div class="skeleton" style="width:70%;height:11px;border-radius:6px;"></div><div class="skeleton" style="width:50%;height:9px;border-radius:4px;margin-top:4px;"></div></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app-interop.js"></script>
    <script src="js/gif-picker.js"></script>
    <script src="js/chat-scroll.js"></script>
    <script src="js/composer-overlay.js"></script>
    <script src="js/indexeddb.js"></script>
    <script src="js/crypto-interop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script src="js/flowbite-interop.js"></script>
    <script>
        function getScrollInfo(elementId) {
            const container = document.getElementById(elementId);
            if (!container) return { position: 0, isAtBottom: true };

            const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
            return { position: container.scrollTop, isAtBottom: isAtBottom };
        }

        function setScrollPosition(elementId, position) {
            const restore = () => {
                const container = document.getElementById(elementId);
                if (container) container.scrollTop = position;
            };

            // Restore after content renders
            requestAnimationFrame(() => {
                requestAnimationFrame(restore);
            });
            setTimeout(restore, 100);
            setTimeout(restore, 300);
            setTimeout(restore, 500);
        }

        function focusComposerInput() {
            const focus = () => {
                const input = document.querySelector('.composer-input');
                if (input) input.focus();
            };
            requestAnimationFrame(focus);
            setTimeout(focus, 50);
            setTimeout(focus, 150);
        }

        function applyTheme(theme) {
            if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        }

        async function showNotification(title, body) {
            if (!('Notification' in window)) return;

            if (Notification.permission === 'default') {
                await Notification.requestPermission();
            }

            if (Notification.permission === 'granted') {
                new Notification(title, {
                    body: body,
                    icon: '/favicon.png',
                    tag: 'encrypted-chat-message'
                });
            }
        }

        // Request notification permission on load
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>

</html>
