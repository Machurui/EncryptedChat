<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EncryptedChat.Client</title>
    <base href="/" />

    <link rel="stylesheet" href="css/output.css" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <script src="js/app-interop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script src="js/flowbite-interop.js"></script>
    <script>
        function scrollToBottom(elementId) {
            const scroll = () => {
                const container = document.getElementById(elementId);
                if (container) container.scrollTop = container.scrollHeight;
            };

            // Scroll après render initial
            requestAnimationFrame(() => {
                requestAnimationFrame(scroll);
            });

            // Re-scroll après chargement des images (100ms, 300ms, 500ms)
            setTimeout(scroll, 100);
            setTimeout(scroll, 300);
            setTimeout(scroll, 500);
        }

        function applyTheme(theme) {
            if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        }

        async function showNotification(title, body) {
            if (!('Notification' in window)) return;

            if (Notification.permission === 'default') {
                await Notification.requestPermission();
            }

            if (Notification.permission === 'granted') {
                new Notification(title, {
                    body: body,
                    icon: '/favicon.png',
                    tag: 'encrypted-chat-message'
                });
            }
        }

        // Request notification permission on load
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>

</html>
