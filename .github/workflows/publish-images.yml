name: Publish images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- API image ----------
      - name: Generate API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/encryptedchat-api
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Api/Dockerfile
          build-args: |
            OBFUSCATE=true
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Extract the API de-obfuscation symbol map.
      - name: Extract API obfuscation map
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Api/Dockerfile
          build-args: |
            OBFUSCATE=true
          target: api-map
          push: false
          outputs: type=local,dest=build-artifacts/api
          cache-from: type=gha

      - name: Upload API obfuscation map
        uses: actions/upload-artifact@v4
        with:
          name: api-obfuscation-map-${{ github.ref_name }}-${{ github.run_id }}
          path: build-artifacts/api/Mapping.txt
          if-no-files-found: error
          retention-days: 90

      # ---------- Web image ----------
      - name: Generate web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/encryptedchat-web
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and publish web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Client/Dockerfile
          build-args: |
            OBFUSCATE=true
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy images to Kubernetes
    needs: publish

    # Le déploiement n'est exécuté que pour un tag v*.
    if: startsWith(github.ref, 'refs/tags/v')

    # Runner GitHub Actions installé sur Debian.
    runs-on:
      - self-hosted
      - linux
      - x64

    environment: production

    concurrency:
      group: encryptedchat-production
      cancel-in-progress: false

    steps:
      - name: Determine image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"

          if [ -z "$VERSION" ]; then
            echo "Impossible de déterminer la version."
            exit 1
          fi

          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version à déployer : $VERSION"

      - name: Configure Kubernetes access
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.kube"

          echo "${{ secrets.KUBE_CONFIG_B64 }}" \
            | base64 --decode \
            > "$HOME/.kube/config"

          chmod 600 "$HOME/.kube/config"

          kubectl cluster-info

      - name: Deploy API image
        shell: bash
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          DEPLOYMENT: ${{ vars.API_DEPLOYMENT }}
          CONTAINER: ${{ vars.API_CONTAINER }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/encryptedchat-api
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          kubectl -n "$NAMESPACE" set image \
            "deployment/$DEPLOYMENT" \
            "$CONTAINER=$IMAGE:$VERSION"

          kubectl -n "$NAMESPACE" rollout status \
            "deployment/$DEPLOYMENT" \
            --timeout=5m

      - name: Deploy web image
        shell: bash
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          DEPLOYMENT: ${{ vars.WEB_DEPLOYMENT }}
          CONTAINER: ${{ vars.WEB_CONTAINER }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/encryptedchat-web
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          kubectl -n "$NAMESPACE" set image \
            "deployment/$DEPLOYMENT" \
            "$CONTAINER=$IMAGE:$VERSION"

          kubectl -n "$NAMESPACE" rollout status \
            "deployment/$DEPLOYMENT" \
            --timeout=5m
