name: Publish images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/encryptedchat-api
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Api/Dockerfile
          build-args: |
            OBFUSCATE=true
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract API obfuscation map
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Api/Dockerfile
          build-args: |
            OBFUSCATE=true
          target: api-map
          push: false
          outputs: type=local,dest=build-artifacts/api
          cache-from: type=gha

      - name: Upload API obfuscation map
        uses: actions/upload-artifact@v4
        with:
          name: api-obfuscation-map-${{ github.ref_name }}-${{ github.run_id }}
          path: build-artifacts/api/Mapping.txt
          if-no-files-found: error
          retention-days: 90

      - name: Generate web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/encryptedchat-web
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and publish web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Client/Dockerfile
          build-args: |
            OBFUSCATE=true
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Restart Kubernetes deployments
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    concurrency:
      group: encryptedchat-production
      cancel-in-progress: false

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes access
        shell: bash
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${KUBE_CONFIG_B64:-}" ]; then
            echo "::error::Le secret KUBE_CONFIG_B64 est vide."
            exit 1
          fi

          KUBE_CONFIG_FILE="$RUNNER_TEMP/kubeconfig.yaml"

          printf '%s' "$KUBE_CONFIG_B64" \
            | base64 --decode \
            > "$KUBE_CONFIG_FILE"

          chmod 600 "$KUBE_CONFIG_FILE"

          echo "KUBECONFIG=$KUBE_CONFIG_FILE" >> "$GITHUB_ENV"

          kubectl --kubeconfig "$KUBE_CONFIG_FILE" config current-context

          kubectl --kubeconfig "$KUBE_CONFIG_FILE" config view \
            --minify \
            -o jsonpath='{.clusters[0].cluster.server}{"\n"}'

          kubectl --kubeconfig "$KUBE_CONFIG_FILE" cluster-info

      - name: Restart API deployment
        shell: bash
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          DEPLOYMENT: ${{ vars.API_DEPLOYMENT }}
        run: |
          set -euo pipefail

          if [ -z "${NAMESPACE:-}" ]; then
            echo "::error::K8S_NAMESPACE est vide."
            exit 1
          fi

          if [ -z "${DEPLOYMENT:-}" ]; then
            echo "::error::API_DEPLOYMENT est vide."
            exit 1
          fi

          kubectl -n "$NAMESPACE" rollout restart \
            "deployment/$DEPLOYMENT"

          kubectl -n "$NAMESPACE" rollout status \
            "deployment/$DEPLOYMENT" \
            --timeout=5m

      - name: Restart client deployment
        shell: bash
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          DEPLOYMENT: ${{ vars.WEB_DEPLOYMENT }}
        run: |
          set -euo pipefail

          if [ -z "${NAMESPACE:-}" ]; then
            echo "::error::K8S_NAMESPACE est vide."
            exit 1
          fi

          if [ -z "${DEPLOYMENT:-}" ]; then
            echo "::error::WEB_DEPLOYMENT est vide."
            exit 1
          fi

          kubectl -n "$NAMESPACE" rollout restart \
            "deployment/$DEPLOYMENT"

          kubectl -n "$NAMESPACE" rollout status \
            "deployment/$DEPLOYMENT" \
            --timeout=5m
