name: Publish images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- API image ----------
      - id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/encryptedchat-api
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Api/Dockerfile
          build-args: OBFUSCATE=true
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Extract the de-obfuscation symbol map (api-map stage; not pushed).
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Api/Dockerfile
          build-args: OBFUSCATE=true
          target: api-map
          push: false
          outputs: type=local,dest=build-artifacts/api
          cache-from: type=gha

      - uses: actions/upload-artifact@v4
        with:
          name: api-obfuscation-map-${{ github.ref_name }}-${{ github.run_id }}
          path: build-artifacts/api/Mapping.txt
          if-no-files-found: error
          retention-days: 90

      # ---------- Web image ----------
      - id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/encryptedchat-web
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: EncryptedChat.Client/Dockerfile
          build-args: OBFUSCATE=true
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
